# Example of a test plan with 1 iteration to demonstrate the delay action.

---
base: 'http://localhost:9000'
iterations: 1
rampup: 0

plan:
  - name: Fetch users
    request:
      url: /api/users.json

  - name: Waiting some milliseconds
    delay:
      milliseconds: 3000

  - name: Fetch organizations
    request:
      url: /api/organizations
