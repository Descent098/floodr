[package]
name = "drill"
version = "0.9.0"
authors = ["Ferran Basora <fcsonline@gmail.com>"]
description = "Drill is a HTTP load testing application written in Rust inspired by Ansible syntax"
repository = "https://github.com/fcsonline/drill"
keywords = ["performance", "http", "ansible", "jmeter"]
license = "GPL-3.0"
edition = "2021"

[dependencies]
clap = "2.32.0"
colored = "2.0.0"
csv = "1.0.5"
regex = "1.5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.39"
serde_yaml = "0.9"
url = "2.1.1"
linked-hash-map = "0.5.3"
tokio = { version = "1.43.1", features = ["time", "net"] }
reqwest = { version = "0.13.2", features = ["cookies", "system-proxy"] }
async-trait = "0.1.30"
futures = "0.3.5"
lazy_static = "1.4.0"
num_cpus = "1.13.0"
rand = "0.8.5"
hdrhistogram = "7.4.0"
hex = "0.4.3"

[dev-dependencies]
tempfile = "3.8"
